<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors Game</title>

    <style>
        body{
            background-color: #181818;
        }

        .title{
            color: white;
            font-size: 40px;
            text-align: center;
            padding-top: 30px;
        }

        .playButtons{
            display:flex;
            flex-direction: row;
            justify-content: center;
            margin: 100px;
            gap: 30px;
        }

        button{
            display:flex;
            flex-direction: column;
            width: 200px;
            height: 150px;
            border-radius: 10px;
            background-color:#181818;
            align-items: center;
            gap:15px;
            color:white;
        }

        img{
            width:80px;
            height:80px;
        }
        .board{
            display: flex;
            flex-direction: column;
            background-color: #262523;
            color: white;
            border-radius: 10px;
            width:600px;
            height:200px;
            margin: 0 auto;
           align-items: center;
        }

        button.reset{
            display: flex;
            align-items: center;
            margin: 0 auto;
            width:100px;
            height: 50px;
            margin-top: 20px;
            padding-top: 15px;
        }

        .move-icon {
        width: 50px;
        height: 50px;
        vertical-align: middle;
}
    .js-moves{
        display:flex;
        justify-content: center;
        flex-direction: row;
        gap: 60px;

        
    }

    .move-result {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}
    
    </style>
    <script src="script.js" defer></script>
</head>

<body>
    <p class="title">Rock Paper Scissors</p>

    <div class="playButtons">
    
    <button onclick="
    playGame('rock');
    ">
    <img src="r.png">
    Rock</button>



    <button onclick="
    playGame('paper');
   ">
   <img src="p.png">
   Paper</button>

    <button onclick="
   playGame('scissors')
    ">
    <img src="s.png">
    Scissors</button>
    </div>

    
    <div class="board">
    <p class="js-moves"></p>
    <p class="js-result"></p>
    <p class="js-score"></p>
    </div>
    
    <button class="reset"
    onclick="
    score.wins = 0;
    score.loses = 0;
    score.ties = 0;
    localStorage.removeItem('score');
    updateScoreElement();
    "> Reset Score</button>

</body>

<script>

    const icons = {
  rock: 'r.png',
  paper: 'p.png',
  scissors: 's.png'
};

    let score =  JSON.parse(localStorage.getItem('score')) || {
    wins: 0,
    loses: 0,
    ties: 0
 };
    updateScoreElement();

    function playGame(playerMove){

    let result = '';
    const computerMove =  pickComputerMove();

    if(playerMove === "scissors"){
    if(computerMove === 'rock'){
        result = 'You Lose';
    }
    else if(computerMove === 'paper'){
        result = 'You Win';
    }
    else if(computerMove === 'scissors'){
        result = 'Tie';
    }
    }

    else if(playerMove === "paper"){
        if(computerMove === 'rock'){
        result = 'You Win';
        }
        else if(computerMove === 'paper'){
            result = 'Tie';
        }
        else if(computerMove === 'scissors'){
            result = 'You Lose';
        }
    }

    else if(playerMove === "rock"){
        if(computerMove === 'rock'){
        result = 'Tie';
        }
        else if(computerMove === 'paper'){
            result = 'You Lose';
        }
        else if(computerMove === 'scissors'){
            result = 'You Win';
        }
    }
    if(result === 'You Win'){
        score.wins ++;
    }
    else if(result === 'You Lose'){
        score.loses ++;
    }
    else if(result === "Tie"){
        score.ties ++
    }

    updateScoreElement();

    document.querySelector('.js-result').
    innerHTML = result;

    document.querySelector('.js-moves').innerHTML = `
  <div class="move-result">
 <img src="${icons[playerMove]}" alt="${playerMove}" class="move-icon">
 <span>You</span>
 </div>
  <div class="move-result">
   <img src="${icons[computerMove]}" alt="${computerMove}" class="move-icon">
 <span>Computer</span>
  </div>
  `;
    


}
    
    
    
    function updateScoreElement(){
    localStorage.setItem('score', JSON.stringify(score));

    document.querySelector('.js-score')
    .innerHTML = `Wins: ${score.wins}, Loses: ${score.loses}, Ties: ${score.ties}`;
   

    }
    
   function pickComputerMove(){
    let computerMove = '';
    const randomNumber = Math.random();
    
    if(randomNumber >= 0 && randomNumber < 1/3){
        computerMove = 'rock';
    }
    else if(randomNumber >=1/3 && randomNumber < 2/3){
        computerMove = 'paper';
    }
    else if(randomNumber >= 2/3 && randomNumber <1){
        computerMove = 'scissors';
    
    }
   
    return computerMove;
   }
    </script>
</body>
</html>
